name: build

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: cmd
        run: build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinPin
          path: WinPin.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # We push straight to main (no PRs), so GitHub's PR-based
      # generate_release_notes has nothing to summarize. Build the
      # changelog from commits since the previous tag instead.
      - name: Build changelog
        run: |
          PREV=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n1)
          {
            echo "## Changes"
            if [ -n "$PREV" ]; then
              git log "${PREV}..${GITHUB_REF_NAME}" --no-merges --pretty=format:'- %s (%h)'
              echo
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${GITHUB_REF_NAME}"
            else
              git log "${GITHUB_REF_NAME}" --no-merges --pretty=format:'- %s (%h)'
            fi
          } > release_notes.md

      - uses: actions/download-artifact@v4
        with:
          name: WinPin
      - uses: softprops/action-gh-release@v2
        with:
          files: WinPin.exe
          body_path: release_notes.md
